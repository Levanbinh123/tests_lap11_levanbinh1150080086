name: Selenium CI

on:
 push:
   branches: [ main ]
 workflow_dispatch:

jobs:
 test:
   runs-on: ubuntu-latest

   steps:
     - uses: actions/checkout@v4

     - name: Setup Java
       uses: actions/setup-java@v4
       with:
         java-version: '17'
         distribution: 'temurin'
         cache: maven

     - name: Run tests
       run: mvn clean test

     - name: Upload results
       if: always()
       uses: actions/upload-artifact@v4
       with:
         name: results
         path: target/
